<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtros Avançados - SciELO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { 
            --text-dark: #1a1a1a; 
            --bg-gray: #f8f9fa; 
            --scielo-blue: #0d6efd;
            --sidebar-width: 80px;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            color: var(--text-dark); 
            background-color: var(--bg-gray); 
        }
        
        /* Navegação Lateral (Sidebar SaaS) */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #ffffff;
            border-right: 1px solid #e9ecef;
            z-index: 1040;
        }
        .sidebar-link {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            color: #6c757d;
            transition: all 0.2s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            color: var(--scielo-blue);
            background-color: #f0f6ff;
            border-right: 3px solid var(--scielo-blue);
        }

        /* Área de Conteúdo */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Customização dos Inputs */
        .form-select, .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border-color: #dee2e6;
            color: #495057;
            font-weight: 500;
        }
        .form-select:focus, .form-control:focus {
            border-color: var(--scielo-blue);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }
        
        /* Botão Adicionar Campo */
        .btn-add-field {
            color: var(--scielo-blue);
            font-weight: 600;
            padding: 0;
        }
        .btn-add-field:hover {
            color: #0a58ca;
        }
        
        /* Botão Remover Linha (Dinâmico) */
        .btn-remove-row {
            color: #dc3545;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn-remove-row:hover {
            color: #a71d2a;
        }
    </style>
</head>
<body>

    <header id="global-header" class="bg-white sticky-top border-bottom shadow-sm"></header>

    <main class="main-content">
        
        <section class="bg-white p-4 p-md-5 rounded-4 shadow-sm w-100 position-relative" style="max-width: 1000px;" aria-labelledby="titulo-filtros">
            
            <button type="button" class="btn-close position-absolute top-0 end-0 m-4" aria-label="Fechar filtros avançados" onclick="window.history.back();"></button>

            <header class="mb-5">
                <h1 id="titulo-filtros" class="fs-4 fw-bold">Filtros avançados</h1>
            </header>

            <form id="formBuscaAvancada">
                
                <div id="containerFiltros" class="d-flex flex-column gap-3 mb-4">
                    
                    <fieldset class="row g-3 align-items-center m-0">
                        <legend class="visually-hidden">Regra de busca 1</legend>
                        <div class="col-12 col-md-3">
                            <select class="form-select" aria-label="Selecione o campo de busca">
                                <option value="todos" selected>Todos os campos</option>
                                <option value="titulo">Título</option>
                                <option value="autor">Autor</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2">
                            <select class="form-select" aria-label="Selecione a condição">
                                <option value="contem" selected>Contém</option>
                                <option value="exato">Exato</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-5">
                            <input type="text" class="form-control" value="information literacy" aria-label="Digite o termo">
                        </div>
                        <div class="col-12 col-md-2">
                            <select class="form-select" aria-label="Operador lógico">
                                <option value="AND" selected>AND</option>
                                <option value="OR">OR</option>
                                <option value="NOT">NOT</option>
                            </select>
                        </div>
                    </fieldset>

                    <fieldset class="row g-3 align-items-center m-0">
                        <legend class="visually-hidden">Regra de busca 2</legend>
                        <div class="col-12 col-md-3">
                            <select class="form-select" aria-label="Selecione o campo de busca">
                                <option value="resumo" selected>Resumo</option>
                                <option value="todos">Todos os campos</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2">
                            <select class="form-select" aria-label="Selecione a condição">
                                <option value="contem" selected>Contém</option>
                                <option value="exato">Exato</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-5">
                            <input type="text" class="form-control" value="school" aria-label="Digite o termo">
                        </div>
                        <div class="col-12 col-md-2">
                            <select class="form-select" aria-label="Operador lógico">
                                <option value="AND" selected>AND</option>
                                <option value="OR">OR</option>
                                <option value="NOT">NOT</option>
                            </select>
                        </div>
                    </fieldset>

                    <fieldset class="row g-3 align-items-center m-0">
                        <legend class="visually-hidden">Regra de busca 3 (Data)</legend>
                        <div class="col-12 col-md-3">
                            <select class="form-select" aria-label="Selecione o campo de busca">
                                <option value="ano" selected>Ano de publicação</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2">
                            <select class="form-select" aria-label="Selecione a condição">
                                <option value="entre" selected>Entre</option>
                                <option value="antes">Antes de</option>
                                <option value="depois">Depois de</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-7 d-flex align-items-center gap-2">
                            <div class="input-group">
                                <input type="number" class="form-control" value="2015" placeholder="AAAA" aria-label="Ano inicial">
                                <span class="input-group-text bg-white"><i class="bi bi-calendar" aria-hidden="true"></i></span>
                            </div>
                            <span class="text-muted fw-medium mx-1">e</span>
                            <div class="input-group">
                                <input type="number" class="form-control" value="2024" placeholder="AAAA" aria-label="Ano final">
                                <span class="input-group-text bg-white"><i class="bi bi-calendar" aria-hidden="true"></i></span>
                            </div>
                        </div>
                    </fieldset>

                </div>

                <button type="button" id="btnAdicionarCampo" class="btn btn-link text-decoration-none btn-add-field mb-5">
                    + Adicionar campo
                </button>

                <footer class="d-flex justify-content-end align-items-center gap-3 mt-4 pt-3">
                    <button type="reset" id="btnLimpar" class="btn btn-light fw-semibold px-4 py-2 border">Limpar</button>
                    <button type="submit" class="btn btn-primary fw-semibold px-5 py-2 rounded-pill">Buscar</button>
                </footer>

            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const containerFiltros = document.getElementById('containerFiltros');
            const btnAdicionarCampo = document.getElementById('btnAdicionarCampo');
            const formBuscaAvancada = document.getElementById('formBuscaAvancada');
            let contadorLinhas = 3; // Já temos 3 linhas no HTML original

            // 1. Função para criar uma nova linha de filtro (Criando HTML dinâmico seguro)
            btnAdicionarCampo.addEventListener('click', () => {
                contadorLinhas++;
                
                // Cria o elemento <fieldset> base
                const novaLinha = document.createElement('fieldset');
                novaLinha.className = 'row g-3 align-items-center m-0 mt-2';
                // Adiciona uma pequena animação de fade-in no CSS via classe Bootstrap
                novaLinha.style.animation = "fadeIn 0.3s ease-in-out";

                // Monta a estrutura interna usando Template Literals
                novaLinha.innerHTML = `
                    <legend class="visually-hidden">Regra de busca ${contadorLinhas}</legend>
                    <div class="col-12 col-md-3">
                        <select class="form-select" aria-label="Selecione o campo de busca">
                            <option value="todos" selected>Todos os campos</option>
                            <option value="titulo">Título</option>
                            <option value="autor">Autor</option>
                            <option value="assunto">Assunto</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2">
                        <select class="form-select" aria-label="Selecione a condição">
                            <option value="contem" selected>Contém</option>
                            <option value="exato">Exato</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <input type="text" class="form-control" placeholder="Digite o termo" aria-label="Digite o termo">
                    </div>
                    <div class="col-10 col-md-2">
                        <select class="form-select" aria-label="Operador lógico">
                            <option value="AND" selected>AND</option>
                            <option value="OR">OR</option>
                            <option value="NOT">NOT</option>
                        </select>
                    </div>
                    <div class="col-2 col-md-1 text-center">
                        <i class="bi bi-trash fs-5 btn-remove-row" title="Remover linha" aria-label="Remover linha" role="button" tabindex="0"></i>
                    </div>
                `;

                // Injeta a nova linha no final do container
                containerFiltros.appendChild(novaLinha);

                // Adiciona o evento de "click" na lixeira recém-criada para remover a linha
                const btnRemover = novaLinha.querySelector('.btn-remove-row');
                btnRemover.addEventListener('click', () => {
                    novaLinha.remove();
                });
            });

            // 2. Interceptar o submit (Buscar)
            formBuscaAvancada.addEventListener('submit', (evento) => {
                evento.preventDefault();
                
                // Em um projeto real, aqui você capturaria todos os selects e inputs para montar a Query String
                const totalRegras = containerFiltros.querySelectorAll('fieldset').length;
                alert(`Busca Avançada iniciada com sucesso utilizando ${totalRegras} regra(s) lógica(s)!`);
                
                // Simula redirecionamento
                // window.location.href = "resultados.html";
            });

            // Adiciona a animação de fade-in no cabeçalho do arquivo para o JS usar
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(-10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
    <script src="components.js"></script>
</body>
</html>
